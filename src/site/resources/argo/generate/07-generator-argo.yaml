apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
    generateName: generator-argo-
    namespace: generator
spec:
    serviceAccountName: default
    entrypoint: pipeline

    arguments:
        parameters:
            -   name: uuid
                value: "427ae6c8-2d17-4e1c-be75-2c43883cdf95"

    templates:
        -   name: pipeline
            steps:
                -   -   name: make-working-dir
                        template: make-working-dir
                        arguments:
                            parameters:
                                -   name: uuid
                                    value: "{{workflow.parameters.uuid}}"

        -   name: make-working-dir
            inputs:
                parameters:
                    -   name: uuid
            container:
                image: alpine
                securityContext:
                    privileged: true
                command: [ sh, -c ]
                args:
                    - |
                        set -e

                        UUID="{{inputs.parameters.uuid}}"
                        WORKDIR="/mnt/nfs/minikube/$UUID"

                        apk add --no-cache nfs-utils

                        mkdir -p /mnt/nfs
                        mount -t nfs nfs-server-service.generator.svc.cluster.local:/ /mnt/nfs

                        echo "NFS contents:"
                        ls /mnt/nfs
                        ls /mnt/nfs/minikube
                        ls $WORKDIR

                        mkdir -p "$WORKDIR"
                        echo "Created: $WORKDIR"
                        ls $WORKDIR
