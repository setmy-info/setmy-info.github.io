apiVersion: v1
kind: Pod
metadata:
    name: nfs-client-test
    namespace: generator
    # kubectl exec -it nfs-client-test -n generator -- sh
    # mount -t nfs nfs-server-service.generator.svc.cluster.local:/exports/packages /mnt/nfs/packages
    # mount -t nfs nfs-server-service.generator.svc.cluster.local:/exports/minikube /mnt/nfs/minikube
    # mount -t nfs nfs-server-service.generator.svc.cluster.local:/ /mnt/nfs
spec:
    containers:
        -   name: client
            image: alpine
            command: [ "sh", "-c", "sleep 3600" ]
            securityContext:
                privileged: true
            volumeMounts:
                -   name: host
                    mountPath: /host
    volumes:
        -   name: host
            hostPath:
                path: /
