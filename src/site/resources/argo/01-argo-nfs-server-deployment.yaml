apiVersion: apps/v1
kind: Deployment
metadata:
    name: argo-nfs-server
    namespace: argo
    labels:
        app: argo-nfs-server
spec:
    replicas: 1
    selector:
        matchLabels:
            app: argo-nfs-server
    template:
        metadata:
            labels:
                app: argo-nfs-server
        spec:
            containers:
                -   name: nfs-server
                    image: itsthenetwork/nfs-server-alpine
                    securityContext:
                        privileged: true
                    env:
                        -   name: SHARED_DIRECTORY
                            value: /exports
                    ports:
                        -   containerPort: 2049
