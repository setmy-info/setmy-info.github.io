apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: ai-demo-
spec:
  entrypoint: pipeline
  arguments:
    parameters:
    - name: pdf-files
      value: '["example1.pdf","example2.pdf","example3.pdf"]'
    - name: arc-files
      value: '["example1.arc.md","example2.arc.md","example3.arc.md"]'
    - name: template-files
      value: '["example1.template.md","example2.template.md","example3.template.md"]'
    - name: prompt-files
      value: '["example1.prompt.md","example2.prompt.md","example3.prompt.md"]'
    - name: gherkin-files
      value: '["example1.feature","example2.feature","example3.feature"]'
    - name: app-name
      value: "my-app"
    - name: java-package
      value: "com.example.myapp"
  templates:

  - name: pipeline
    steps:
    # Step 1: parallel - load and embed each PDF requirement file
    - - name: load-and-embed-pdf-requirements
        template: echo-filepath
        arguments:
          parameters:
          - name: filepath
            value: "{{item}}"
        withParam: "{{workflow.parameters.pdf-files}}"

    # Step 2: parallel - load and embed each Gherkin file
    - - name: load-and-embed-gherkin-files
        template: echo-filepath
        arguments:
          parameters:
          - name: filepath
            value: "{{item}}"
        withParam: "{{workflow.parameters.gherkin-files}}"

    # Step 3: parallel - load and embed each architecture rules file
    - - name: load-and-embed-architecture-rules
        template: echo-filepath
        arguments:
          parameters:
          - name: filepath
            value: "{{item}}"
        withParam: "{{workflow.parameters.arc-files}}"

    # Step 4: parallel - load and embed each prompt template file
    - - name: load-and-embed-prompt-templates
        template: echo-filepath
        arguments:
          parameters:
          - name: filepath
            value: "{{item}}"
        withParam: "{{workflow.parameters.template-files}}"

    # Step 5: parallel - load and embed each prompt fragment file
    - - name: load-and-embed-prompt-fragments
        template: echo-filepath
        arguments:
          parameters:
          - name: filepath
            value: "{{item}}"
        withParam: "{{workflow.parameters.prompt-files}}"

    - - name: run-claude
        template: run-claude
        arguments:
          parameters:
          - name: message
            value: "Step 5: Run Claude CLI to generate JHipster .jh file"

    - - name: generate-mermaid
        template: echo-message
        arguments:
          parameters:
          - name: message
            value: "Step 6: Generate Mermaid UML diagrams"

    - - name: convert-mermaid
        template: echo-message
        arguments:
          parameters:
          - name: message
            value: "Step 7: Convert Mermaid diagrams to PNG"

    - - name: build-jhipster
        template: echo-message
        arguments:
          parameters:
          - name: message
            value: "Step 8: Build JHipster application and produce JAR"
          - name: app-name
            value: "{{workflow.parameters.app-name}}"
          - name: java-package
            value: "{{workflow.parameters.java-package}}"

    - - name: run-specifications
        template: echo-message
        arguments:
          parameters:
          - name: message
            value: "Step 9: Run specifications"


  - name: run-claude
    inputs:
      parameters:
      - name: message
    container:
      image: alpine:3.18
      command: ["/bin/sh","-c"]
      args:
        - echo "{{inputs.parameters.message}}" && echo "CLAUDE_TOKEN=$CLAUDE_TOKEN"
      env:
      - name: CLAUDE_TOKEN
        valueFrom:
          secretKeyRef:
            name: ai-demo-secrets
            key: claude-token

  - name: echo-message
    inputs:
      parameters:
      - name: message
      - name: app-name
        default: ""
      - name: java-package
        default: ""
    container:
      image: alpine:3.18
      command: ["/bin/sh","-c"]
      args:
        - echo "{{inputs.parameters.message}}"

  - name: echo-filepath
    inputs:
      parameters:
      - name: filepath
    container:
      image: alpine:3.18
      command: ["/bin/sh","-c"]
      args:
        - echo "{{inputs.parameters.filepath}}"
