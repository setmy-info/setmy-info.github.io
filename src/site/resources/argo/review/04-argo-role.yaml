apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-role
  namespace: review
rules:
  - apiGroups: ["argoproj.io"]
    resources:
      - workflows
      - workflowtemplates
      - cronworkflows
      - workflowtaskresults
    verbs: ["*"]
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/exec
      - configmaps
      - secrets
    verbs: ["*"]
