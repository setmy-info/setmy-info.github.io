apiVersion: v1
kind: PersistentVolume
metadata:
    name: argo-nfs-shared-persistent-volume
spec:
    capacity:
        storage: 5Gi
    volumeMode: Filesystem
    accessModes:
        - ReadWriteMany
    storageClassName: nfs
    nfs:
        server: argo-nfs-server.argo.svc.cluster.local
        path: /
    persistentVolumeReclaimPolicy: Retain
