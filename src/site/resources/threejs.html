<!DOCTYPE html>
<html lang="en">
<head>
    <title>Three.js Simple Robotic Arm</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div id="info">
    Three.js 3-Joint Robotic Arm<br>
    Simple 3D WebGL demo
</div>

<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls;
    let joint1, joint2, joint3;

    init();
    animate();

    function init() {
        // Scene
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x333333);

        // Camera
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);

        // Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Controls
        controls = new OrbitControls(camera, renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        // Helpers
        const gridHelper = new THREE.GridHelper(10, 10);
        scene.add(gridHelper);

        // Robotic Arm Parts
        const segmentHeight = 2;
        const segmentRadius = 0.2;
        const boxGeometry = new THREE.BoxGeometry(segmentRadius * 2, segmentHeight, segmentRadius * 2);
        const sphereGeometry = new THREE.SphereGeometry(0.3, 32, 32);
        const material = new THREE.MeshStandardMaterial({ color: 0x0077ff });
        const jointMaterial = new THREE.MeshStandardMaterial({ color: 0xff7700 });

        // Base
        const base = new THREE.Mesh(new THREE.BoxGeometry(1, 0.2, 1), material);
        scene.add(base);

        // Joint 1 (Base Rotation)
        joint1 = new THREE.Group();
        base.add(joint1);

        const arm1 = new THREE.Mesh(boxGeometry, material);
        arm1.position.y = segmentHeight / 2;
        joint1.add(arm1);

        const sphere1 = new THREE.Mesh(sphereGeometry, jointMaterial);
        joint1.add(sphere1);

        // Joint 2 (Middle)
        joint2 = new THREE.Group();
        joint2.position.y = segmentHeight;
        joint1.add(joint2);

        const arm2 = new THREE.Mesh(boxGeometry, material);
        arm2.position.y = segmentHeight / 2;
        joint2.add(arm2);

        const sphere2 = new THREE.Mesh(sphereGeometry, jointMaterial);
        joint2.add(sphere2);

        // Joint 3 (Top)
        joint3 = new THREE.Group();
        joint3.position.y = segmentHeight;
        joint2.add(joint3);

        const arm3 = new THREE.Mesh(new THREE.BoxGeometry(segmentRadius * 2, segmentHeight / 2, segmentRadius * 2), material);
        arm3.position.y = segmentHeight / 4;
        joint3.add(arm3);

        const sphere3 = new THREE.Mesh(sphereGeometry, jointMaterial);
        joint3.add(sphere3);

        window.addEventListener('resize', onWindowResize, false);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);

        const time = Date.now() * 0.001;

        // Animate joints
        joint1.rotation.y = Math.sin(time) * 0.5;
        joint2.rotation.z = Math.sin(time * 1.5) * 0.5;
        joint3.rotation.z = Math.sin(time * 2) * 0.5;

        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
